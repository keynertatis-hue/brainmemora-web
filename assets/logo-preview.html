<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>BrainMemora — Identidad</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --v:#8B5CF6; --vl:#B79CFF; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Space Grotesk',system-ui,sans-serif;background:#08080C;color:#F3F2F7;padding:56px 24px;line-height:1.6}
  .wrap{max-width:1000px;margin:0 auto}
  h1{font-family:'Newsreader',serif;font-weight:400;font-size:38px;letter-spacing:-1px;margin-bottom:6px}
  .lead{color:#A6A4B4;margin-bottom:48px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px;margin-bottom:48px}
  .card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:34px;display:flex;flex-direction:column;align-items:center;gap:18px;justify-content:center;min-height:220px}
  .card.light{background:#F3F2F7}
  .label{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#6E6C7E}
  .card.light .label{color:#8a8a96}
  /* App icon (tile) */
  .icon{width:96px;height:96px;border-radius:22px;background:linear-gradient(135deg,#8B5CF6,#6D28D9);box-shadow:0 10px 30px rgba(139,92,246,.3);display:flex;align-items:center;justify-content:center}
  .icon svg{width:62px;height:62px}
  .icon.sm{width:48px;height:48px;border-radius:11px}.icon.sm svg{width:31px;height:31px}
  .icon.xs{width:16px;height:16px;border-radius:4px}.icon.xs svg{width:11px;height:11px}
  .sizes{display:flex;align-items:center;gap:20px}
  /* Wordmark lockup */
  .lockup{display:flex;align-items:center;gap:13px}
  .lockup .icon{width:42px;height:42px;border-radius:10px;box-shadow:none}.lockup .icon svg{width:27px;height:27px}
  .word{font-size:27px;font-weight:600;letter-spacing:-.5px}
  .word b{font-weight:600;color:var(--vl)}
  .card.light .word{color:#0A0A0F}.card.light .word b{color:#6D28D9}
  /* Mono */
  .mono svg path{stroke:#fff}.mono svg circle{fill:#fff}
  .swatch{display:flex;gap:10px}.dot{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.12)}
</style>
</head>
<body>
<div class="wrap">
  <h1>BrainMemora</h1>
  <p class="lead">Sistema de identidad. Una sola marca para la web y la extensión: una <em>ruta neural</em> que sube de un nodo a la meta — el copiloto que guía tu aprendizaje.</p>

  <div class="grid">
    <div class="card">
      <span class="label">Ícono de app</span>
      <div class="icon" id="i-big"></div>
    </div>
    <div class="card">
      <span class="label">Tamaños extensión</span>
      <div class="sizes">
        <div class="icon" id="i-128" style="width:64px;height:64px;border-radius:15px"></div>
        <div class="icon sm" id="i-48"></div>
        <div class="icon xs" id="i-16"></div>
      </div>
    </div>
    <div class="card">
      <span class="label">Lockup horizontal</span>
      <div class="lockup"><div class="icon" id="i-lock"></div><div class="word">Brain<b>Memora</b></div></div>
    </div>
    <div class="card light">
      <span class="label">Sobre fondo claro</span>
      <div class="lockup"><div class="icon" id="i-lock2"></div><div class="word">Brain<b>Memora</b></div></div>
    </div>
    <div class="card">
      <span class="label">Versión monocroma</span>
      <div class="mono" id="i-mono" style="width:70px;height:70px"></div>
    </div>
    <div class="card">
      <span class="label">Paleta</span>
      <div class="swatch">
        <div class="dot" style="background:#8B5CF6" title="#8B5CF6"></div>
        <div class="dot" style="background:#6D28D9" title="#6D28D9"></div>
        <div class="dot" style="background:#B79CFF" title="#B79CFF"></div>
        <div class="dot" style="background:#08080C" title="#08080C"></div>
      </div>
    </div>
  </div>
</div>

['i-big','i-128','i-48','i-16','i-lock','i-lock2'].forEach(id=>document.getElementById(id).innerHTML=GLYPH);
document.getElementById('i-mono').innerHTML=MONO;
</script>
</body>
</html>
